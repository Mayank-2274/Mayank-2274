name: Update Contributions Badge

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get total contributions till now
        id: contributions
        env:
          PROFILE_STATS_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
          GITHUB_TOKEN_FALLBACK: ${{ github.token }}
        run: |
          TOKEN="$PROFILE_STATS_TOKEN"
          if [ -z "$TOKEN" ]; then
            echo "PROFILE_STATS_TOKEN is not set; using GITHUB_TOKEN fallback (public contributions only)."
            TOKEN="$GITHUB_TOKEN_FALLBACK"
          fi

          USERNAME="Mayank-2274"
          CURRENT_YEAR=$(date -u +%Y)

          YEARS_QUERY=$(cat <<'EOF'
          query($username: String!) {
            user(login: $username) {
              contributionsCollection {
                contributionYears
              }
            }
          }
          EOF
          )

          YEARS_RESPONSE=$(curl -fsSL -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg q "$YEARS_QUERY" --arg username "$USERNAME" '{query:$q,variables:{username:$username}}')")

          YEARS_ERRORS=$(echo "$YEARS_RESPONSE" | jq -r '.errors // empty')
          if [ -n "$YEARS_ERRORS" ]; then
            echo "GitHub GraphQL returned errors while fetching contribution years:"
            echo "$YEARS_RESPONSE"
            exit 1
          fi

          YEARS=$(echo "$YEARS_RESPONSE" | jq -r '.data.user.contributionsCollection.contributionYears[]?')
          if [ -z "$YEARS" ]; then
            echo "Could not fetch contribution years. Response:"
            echo "$YEARS_RESPONSE"
            exit 1
          fi

          RANGE_QUERY=$(cat <<'EOF'
          query($username: String!, $from: DateTime!, $to: DateTime!) {
            user(login: $username) {
              contributionsCollection(from: $from, to: $to) {
                contributionCalendar {
                  totalContributions
                }
              }
            }
          }
          EOF
          )

          TOTAL_ALL=0
          for YEAR in $YEARS; do
            FROM_DATE="${YEAR}-01-01T00:00:00Z"
            if [ "$YEAR" = "$CURRENT_YEAR" ]; then
              TO_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            else
              TO_DATE="${YEAR}-12-31T23:59:59Z"
            fi

            RANGE_RESPONSE=$(curl -fsSL -X POST https://api.github.com/graphql \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg q "$RANGE_QUERY" --arg username "$USERNAME" --arg from "$FROM_DATE" --arg to "$TO_DATE" '{query:$q,variables:{username:$username,from:$from,to:$to}}')")

            RANGE_ERRORS=$(echo "$RANGE_RESPONSE" | jq -r '.errors // empty')
            if [ -n "$RANGE_ERRORS" ]; then
              echo "GitHub GraphQL returned errors for year $YEAR:"
              echo "$RANGE_RESPONSE"
              exit 1
            fi

            YEAR_TOTAL=$(echo "$RANGE_RESPONSE" | jq -r '.data.user.contributionsCollection.contributionCalendar.totalContributions // 0')
            TOTAL_ALL=$((TOTAL_ALL + YEAR_TOTAL))
          done

          echo "total=$TOTAL_ALL" >> "$GITHUB_OUTPUT"

      - name: Generate total contributions badge
        env:
          TOTAL: ${{ steps.contributions.outputs.total }}
        run: |
          mkdir -p assets
          BADGE_URL="https://img.shields.io/badge/Total%20Contributions-${TOTAL}-1f6feb?style=for-the-badge&logo=github&logoColor=white&labelColor=0d1117"
          curl -sSL "$BADGE_URL" -o assets/total-contributions.svg

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/total-contributions.svg
          git commit -m "chore: update total contributions badge"
          git push
